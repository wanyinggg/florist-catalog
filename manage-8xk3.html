<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lazy Cloudd</title>
  <link rel="icon" href="flower.png" type="image/png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF6F1;
      --blush: #FDF9F7;
      --purple: #2C3E2D;
      --purple-mid: #8FAF8C;
      --purple-light: #f0e8e6;
      --pink: #E8C5C0;
      --pink-deep: #C9908A;
      --text: #3A2E2E;
      --muted: #9A8A88;
      --white: #FFFFFF;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Login */
    #viewLogin {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      border: 1.5px solid var(--purple-light);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(44, 62, 45, .1);
    }

    .login-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--purple);
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .fg {
      margin-bottom: 14px;
    }

    .fg label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .fg input,
    .fg textarea,
    .fg select {
      width: 100%;
      border: 1.5px solid var(--purple-light);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--blush);
      outline: none;
      transition: border-color .2s;
    }

    .fg input:focus,
    .fg textarea:focus,
    .fg select:focus {
      border-color: var(--purple);
    }

    .btn-primary {
      width: 100%;
      background: var(--purple);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: var(--purple-mid);
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .hint {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 14px;
      line-height: 1.7;
    }

    .hint a {
      color: var(--purple);
    }

    .err {
      font-size: .78rem;
      color: var(--pink-deep);
      margin-top: 8px;
      min-height: 20px;
    }

    /* Main */
    #viewMain {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .adm-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 248, 255, .95);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--purple-light);
      padding: 0 clamp(16px, 4vw, 48px);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .adm-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--purple);
    }

    .adm-logo em {
      font-family: 'Inter', sans-serif;
      font-size: .7rem;
      color: var(--muted);
      font-style: normal;
      margin-left: 8px;
    }

    .hdr-btns {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      background: none;
      border: 1.5px solid var(--purple-light);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      color: var(--purple);
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }

    .btn-sm:hover {
      background: var(--purple-light);
    }

    .btn-sm:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-add {
      background: var(--purple);
      color: var(--white);
      border-color: var(--purple);
    }

    .btn-add:hover {
      background: var(--purple-mid);
      border-color: var(--purple-mid);
    }

    .btn-save {
      background: var(--purple);
      color: var(--white);
      border-color: var(--purple);
    }

    .btn-save:hover {
      background: var(--purple-mid);
      border-color: var(--purple-mid);
    }

    .btn-save.dirty {
      background: var(--pink-deep);
      border-color: var(--pink-deep);
    }

    .adm-body {
      padding: clamp(16px, 3vw, 32px) clamp(16px, 4vw, 48px);
      flex: 1;
    }

    .body-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .body-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--purple);
    }

    .body-meta {
      font-size: .78rem;
      color: var(--muted);
    }

    /* Search */
    .search-bar {
      margin-bottom: 12px;
    }

    /* Category filter */
    .cat-filter {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px;
    }
    .cat-btn {
      background: none; border: 1.5px solid var(--purple-light); border-radius: 20px;
      padding: 5px 14px; font-family: 'Inter', sans-serif; font-size: .75rem;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: background .15s, color .15s, border-color .15s;
      white-space: nowrap;
    }
    .cat-btn:hover { background: var(--purple-light); color: var(--purple); }
    .cat-btn.active { background: var(--purple); color: var(--white); border-color: var(--purple); }

    /* View tabs */
    .view-tabs {
      display: flex; gap: 6px; margin-bottom: 20px;
    }
    .view-tab {
      background: none; border: 1.5px solid var(--purple-light); border-radius: 20px;
      padding: 6px 16px; font-family: 'Inter', sans-serif; font-size: .8rem;
      font-weight: 500; color: var(--muted); cursor: pointer; transition: background .15s, color .15s, border-color .15s;
    }
    .view-tab:hover { background: var(--purple-light); color: var(--purple); }
    .view-tab.active { background: var(--purple); color: var(--white); border-color: var(--purple); }

    /* Collection list */
    #collectionList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .collection-row {
      background: var(--white);
      border: 1.5px solid var(--purple-light);
      border-radius: 12px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .cr-info {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .cr-label {
      font-size: .85rem;
      color: var(--purple);
      font-weight: 500;
    }

    .cr-meta {
      font-size: .7rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .cr-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .cr-btns button {
      border: 1.5px solid var(--purple-light);
      border-radius: 8px;
      background: none;
      padding: 5px 12px;
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-edit-inline {
      color: var(--purple);
    }

    .btn-edit-inline:hover {
      background: var(--purple-light);
    }

    .btn-del-inline {
      color: var(--pink-deep);
    }

    .btn-del-inline:hover {
      background: #fff0ee;
    }

    .search-bar input {
      width: 100%;
      max-width: 360px;
      border: 1.5px solid var(--purple-light);
      border-radius: 10px;
      padding: 9px 14px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color .2s;
    }

    .search-bar input:focus {
      border-color: var(--purple);
    }

    /* Product rows */
    #productList {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 12px;
    }

    .product-row {
      background: var(--white);
      border: 1.5px solid var(--purple-light);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .15s;
    }

    .product-row:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
    }

    .pr-thumb {
      width: 100%;
      aspect-ratio: 3/4;
      background: var(--purple-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
    }

    .pr-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pr-info {
      padding: 8px 10px 6px;
      flex: 1;
      min-width: 0;
    }

    .pr-name {
      display: block;
      font-size: .8rem;
      color: var(--purple);
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .pr-price {
      display: block;
      font-size: .78rem;
      font-weight: 600;
      color: var(--text);
      margin-top: 2px;
    }

    .pr-col {
      display: block;
      font-size: .67rem;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-top: 2px;
    }

    .pr-btns {
      display: flex;
      border-top: 1.5px solid var(--purple-light);
    }

    .btn-edit,
    .btn-del {
      flex: 1;
      border: none;
      border-radius: 0;
      padding: 7px 0;
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      font-weight: 500;
      cursor: pointer;
      background: none;
      transition: background .2s;
    }

    .btn-edit {
      color: var(--purple);
      border-right: 1px solid var(--purple-light);
    }

    .btn-edit:hover {
      background: var(--purple-light);
    }

    .btn-del {
      color: var(--pink-deep);
    }

    .btn-del:hover {
      background: #fff0ee;
    }

    #loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: .88rem;
    }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(46, 42, 69, .4);
      z-index: 300;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px;
      overflow-y: auto;
      backdrop-filter: blur(3px);
    }

    .modal-box {
      background: var(--white);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 16px 48px rgba(44, 62, 45, .18);
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--purple);
      margin-bottom: 20px;
    }

    .fg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 16px;
    }

    .fg.span2 {
      grid-column: 1/-1;
    }

    .section-lbl {
      font-size: .7rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 16px 0 8px;
      grid-column: 1/-1;
    }

    .col-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 6px;
      grid-column: 1/-1;
    }

    .col-cb {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .78rem;
      color: var(--text);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--purple-light);
      transition: background .15s;
    }

    .col-cb:hover {
      background: var(--blush);
    }

    .col-cb input {
      accent-color: var(--purple);
      cursor: pointer;
      flex-shrink: 0;
    }

    .img-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      grid-column: 1/-1;
      margin-bottom: 6px;
    }

    .img-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--blush);
      border: 1.5px solid var(--purple-light);
      border-radius: 8px;
      padding: 4px 8px 4px 4px;
      font-size: .7rem;
      color: var(--muted);
      max-width: 220px;
    }

    .img-chip img {
      width: 30px;
      height: 36px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .img-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .img-rm {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0 2px;
      font-size: .8rem;
      flex-shrink: 0;
      line-height: 1;
    }

    .img-rm:hover {
      color: var(--pink-deep);
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1.5px dashed var(--purple-light);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--purple);
      cursor: pointer;
      transition: background .2s;
      grid-column: 1/-1;
    }

    .btn-upload:hover {
      background: var(--blush);
    }

    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1.5px solid var(--purple-light);
    }

    .btn-cancel {
      background: none;
      border: 1.5px solid var(--purple-light);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--muted);
      cursor: pointer;
      transition: background .2s;
    }

    .btn-cancel:hover {
      background: var(--blush);
    }

    .btn-ms {
      background: var(--purple);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-ms:hover {
      background: var(--purple-mid);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--purple);
      color: var(--white);
      padding: 9px 20px;
      border-radius: 30px;
      font-size: .8rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 500;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.err {
      background: var(--pink-deep);
    }

    /* Confirm dialog */
    .confirm-bg {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      display: flex; align-items: center; justify-content: center;
      z-index: 600;
    }

    .confirm-box {
      background: var(--white);
      border-radius: 18px;
      padding: 28px 28px 20px;
      width: min(320px, 90vw);
      box-shadow: 0 8px 40px rgba(0,0,0,.18);
      text-align: center;
    }

    .confirm-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    .confirm-msg {
      font-size: .95rem;
      color: var(--text);
      font-weight: 500;
      margin-bottom: 6px;
    }

    .confirm-sub {
      font-size: .8rem;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .confirm-btns {
      display: flex;
      gap: 10px;
    }

    .confirm-btns button {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s;
    }

    .confirm-btns button:hover { opacity: .85; }

    .btn-confirm-cancel {
      background: var(--purple-light);
      color: var(--text);
    }

    .btn-confirm-ok {
      background: var(--pink-deep);
      color: #fff;
    }

    @media(max-width:600px) {
      .fg-grid {
        grid-template-columns: 1fr;
      }

      .fg.span2 {
        grid-column: 1;
      }

      .section-lbl {
        grid-column: 1;
      }

      .col-grid {
        grid-column: 1;
      }

      .img-chips {
        grid-column: 1;
      }

      .btn-upload {
        grid-column: 1;
      }

      .adm-logo em {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Login -->
  <div id="viewLogin">
    <div class="login-card">
      <div class="login-brand">Lazy Cloudd</div>
      <div class="login-sub" id="loginSub">Admin Login</div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="inPw" placeholder="Admin password" autocomplete="current-password" />
      </div>
      <button class="btn-primary" id="btnLogin">Login</button>
      <p class="err" id="loginErr"></p>
    </div>
  </div>

  <!-- Main -->
  <div id="viewMain" class="hidden">
    <header class="adm-header">
      <div class="adm-logo">Lazy Cloudd <em>Admin</em></div>
      <div class="hdr-btns">
        <button class="btn-sm btn-add" id="btnAdd">+ Add Product</button>
        <button class="btn-sm btn-add hidden" id="btnAddCol">+ Add Collection</button>
        <button class="btn-sm" id="btnLogout">Logout</button>
      </div>
    </header>
    <div class="adm-body">
      <div class="view-tabs">
        <button class="view-tab active" data-view="products">Products</button>
        <button class="view-tab" data-view="collections">Collections</button>
      </div>
      <div id="productsView">
        <div class="body-head">
          <h1 class="body-title">Products</h1>
          <span class="body-meta" id="bodyMeta"></span>
        </div>
        <div class="search-bar" style="display:flex;gap:8px;align-items:center;">
          <input type="search" id="searchInput" placeholder="Search products…" />
          <button class="btn-sm" id="btnSort" style="white-space:nowrap;flex-shrink:0;">Price ↑</button>
        </div>
        <div class="cat-filter" id="catFilter"></div>
        <div id="loading">Loading…</div>
        <div id="productList"></div>
      </div>
      <div id="collectionsView" class="hidden">
        <div class="body-head">
          <h1 class="body-title">Collections</h1>
          <span class="body-meta" id="colMeta"></span>
        </div>
        <div id="collectionList"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-bg hidden">
    <div class="modal-box">
      <h2 class="modal-title" id="modalTitle">Add Product</h2>
      <div class="fg-grid">
        <div class="fg span2">
          <label>Name</label>
          <input type="text" id="fName" placeholder="Product name" />
        </div>
        <div class="fg">
          <label>Price (RM)</label>
          <input type="number" id="fPrice" placeholder="0" min="0" step="1" />
        </div>
        <div class="fg">
          <label>Badge</label>
          <select id="fBadge">
            <option value="">None</option>
            <option value="popular">Popular</option>
            <option value="seasonal">Seasonal</option>
            <option value="custom">Custom-friendly</option>
          </select>
        </div>
        <div class="fg span2">
          <label>Description</label>
          <textarea id="fDesc" rows="2" placeholder="Optional description…"></textarea>
        </div>
        <div class="fg">
          <label>Height <span style="font-weight:400;font-size:.68rem">(optional)</span></label>
          <input type="text" id="fHeight" placeholder="e.g. 40cm" />
        </div>
        <div class="fg">
          <label>Width <span style="font-weight:400;font-size:.68rem">(optional)</span></label>
          <input type="text" id="fWidth" placeholder="e.g. 30cm" />
        </div>

        <div class="section-lbl">Collections</div>
        <div class="col-grid" id="colGrid"></div>

        <div class="section-lbl">Images</div>
        <div class="img-chips" id="imgChips"></div>
        <button type="button" class="btn-upload" id="btnUpload">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload image(s)
        </button>
        <input type="file" id="fileInput" accept="image/*" multiple class="hidden" />
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-ms" id="btnModalSave">Save Product</button>
      </div>
    </div>
  </div>

  <!-- Collection modal -->
  <div id="colModal" class="modal-bg hidden">
    <div class="modal-box">
      <h2 class="modal-title" id="colModalTitle">Add Collection</h2>
      <div class="fg-grid">
        <div class="fg span2">
          <label>Label <span style="font-weight:400;font-size:.68rem">(emoji + name, shown to customers)</span></label>
          <input type="text" id="cfLabel" placeholder="e.g. 🎓 Graduation" />
        </div>
        <div class="fg">
          <label>Slug (ID) <span style="font-weight:400;font-size:.68rem">(used in URLs)</span></label>
          <input type="text" id="cfId" placeholder="e.g. graduation" />
        </div>
        <div class="fg">
          <label>Sort order <span style="font-weight:400;font-size:.68rem">(lower shows first)</span></label>
          <input type="number" id="cfSort" placeholder="0" step="1" />
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" id="btnColCancel">Cancel</button>
        <button class="btn-ms" id="btnColModalSave">Save Collection</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="confirm-bg hidden" id="confirmDlg">
    <div class="confirm-box">
      <div class="confirm-msg" id="confirmMsg"></div>
      <div class="confirm-sub" id="confirmSub"></div>
      <div class="confirm-btns">
        <button class="btn-confirm-cancel" id="confirmCancel">Cancel</button>
        <button class="btn-confirm-ok" id="confirmOk">Delete</button>
      </div>
    </div>
  </div>

  <script src="assets/supabase.js"></script>
  <script src="products.js"></script>
  <script>
    if (location.hostname === 'lazycloudd.com') { location.replace('/'); }

    const PW_KEY = 'lc_adm_pw';

    function showConfirm(msg, sub) {
      return new Promise(resolve => {
        document.getElementById('confirmMsg').textContent = msg;
        document.getElementById('confirmSub').textContent = sub || '';
        document.getElementById('confirmDlg').classList.remove('hidden');
        const ok = document.getElementById('confirmOk');
        const cancel = document.getElementById('confirmCancel');
        function close(val) {
          document.getElementById('confirmDlg').classList.add('hidden');
          ok.removeEventListener('click', onOk);
          cancel.removeEventListener('click', onCancel);
          resolve(val);
        }
        const onOk = () => close(true);
        const onCancel = () => close(false);
        ok.addEventListener('click', onOk);
        cancel.addEventListener('click', onCancel);
      });
    }
    const fileToDataUrl = f => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(f); });

    let products = [], collections = [];
    let editingId = null, modalImgs = [], pendingImgs = [], activeCat = '', sortDir = 0;
    let editingColId = null, currentView = 'products';

    // ── UI helpers ──────────────────────────────────────────────────────────────
    function showView(id) {
      ['viewLogin', 'viewMain'].forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id));
    }

    let toastTimer;
    function toast(msg, isErr = false) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (isErr ? ' err' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    // ── Cat filter ──────────────────────────────────────────────────────────────
    function buildCatFilter() {
      const bar = document.getElementById('catFilter');
      bar.innerHTML = '';
      const all = document.createElement('button');
      all.className = 'cat-btn' + (activeCat === '' ? ' active' : '');
      all.textContent = 'All';
      all.onclick = () => { activeCat = ''; buildCatFilter(); renderList(document.getElementById('searchInput').value); };
      bar.appendChild(all);
      collections.forEach(t => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn' + (activeCat === t.id ? ' active' : '');
        btn.textContent = t.label;
        btn.onclick = () => { activeCat = t.id; buildCatFilter(); renderList(document.getElementById('searchInput').value); };
        bar.appendChild(btn);
      });
    }

    // ── Product list ────────────────────────────────────────────────────────────
    function renderList(filter = '') {
      const list = document.getElementById('productList');
      const q = filter.toLowerCase();
      let visible = activeCat
        ? products.filter(p => (Array.isArray(p.collection) ? p.collection : [p.collection]).includes(activeCat))
        : products;
      if (q) visible = visible.filter(p => p.name.toLowerCase().includes(q) || String(p.price).includes(q));
      if (sortDir) visible = [...visible].sort((a, b) => sortDir * (a.price - b.price));
      document.getElementById('bodyMeta').textContent = `${products.length} products${visible.length !== products.length ? ` · ${visible.length} shown` : ''}`;
      list.innerHTML = '';
      visible.forEach(p => {
        const row = document.createElement('div');
        row.className = 'product-row';
        const firstImg = p.img ? (Array.isArray(p.img) ? p.img[0] : p.img) : null;
        const pending = firstImg ? pendingImgs.find(x => x.filename === firstImg) : null;
        const thumbSrc = pending ? pending.dataUrl : firstImg ? imgSrc(firstImg) : null;
        const cols = (Array.isArray(p.collection) ? p.collection : [p.collection]).join(', ');
        row.innerHTML = `
      <div class="pr-thumb">${thumbSrc ? `<img src="${thumbSrc}" alt="" onerror="this.style.display='none'"/>` : '🌸'}</div>
      <div class="pr-info">
        <span class="pr-name">${p.name}</span>
        <span class="pr-price">RM ${p.price}</span>
        <span class="pr-col">${cols}</span>
      </div>
      <div class="pr-btns">
        <button class="btn-edit">Edit</button>
        <button class="btn-del">Delete</button>
      </div>`;
        row.querySelector('.btn-edit').onclick = () => openModal(p.id);
        row.querySelector('.btn-del').onclick = async () => {
          const ok = await showConfirm(`Delete "${p.name}"?`, 'This cannot be undone.');
          if (!ok) return;
          try {
            await sbDelete(p.id);
            products = products.filter(x => x.id !== p.id);
            renderList(document.getElementById('searchInput').value);
            toast('Product deleted.');
          } catch (err) {
            toast('Delete failed: ' + err.message, true);
          }
        };
        list.appendChild(row);
      });
      if (!visible.length) list.innerHTML = '<p style="color:var(--muted);font-size:.88rem;padding:40px 0">No products found.</p>';
    }

    // ── Modal ───────────────────────────────────────────────────────────────────
    function buildColGrid() {
      const g = document.getElementById('colGrid');
      g.innerHTML = '';
      collections.forEach(t => {
        const lbl = document.createElement('label');
        lbl.className = 'col-cb';
        lbl.innerHTML = `<input type="checkbox" id="col_${t.id}" value="${t.id}"/>${t.label}`;
        g.appendChild(lbl);
      });
    }

    // ── Collections view ────────────────────────────────────────────────────────
    function setView(view) {
      currentView = view;
      document.getElementById('productsView').classList.toggle('hidden', view !== 'products');
      document.getElementById('collectionsView').classList.toggle('hidden', view !== 'collections');
      document.getElementById('btnAdd').classList.toggle('hidden', view !== 'products');
      document.getElementById('btnAddCol').classList.toggle('hidden', view !== 'collections');
      document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
    }

    function slugify(s) {
      return s
        .replace(/\p{Extended_Pictographic}/gu, '')
        .replace(/[\u{FE00}-\u{FE0F}\u{200D}]/gu, '')
        .toLowerCase().trim()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    function refreshCollectionGlobals() {
      TABS = collections;
      BG = Object.fromEntries(collections.map(c => [c.id, c.bg]));
    }

    function renderCollections() {
      const list = document.getElementById('collectionList');
      document.getElementById('colMeta').textContent = `${collections.length} collections`;
      list.innerHTML = '';
      collections.forEach(c => {
        const count = products.filter(p => (Array.isArray(p.collection) ? p.collection : [p.collection]).includes(c.id)).length;
        const row = document.createElement('div');
        row.className = 'collection-row';
        row.innerHTML = `
      <div class="cr-info">
        <span class="cr-label">${c.label}</span>
        <span class="cr-meta">${c.id} · ${count} product${count === 1 ? '' : 's'}</span>
      </div>
      <div class="cr-btns">
        <button class="btn-edit-inline">Edit</button>
        <button class="btn-del-inline">Delete</button>
      </div>`;
        row.querySelector('.btn-edit-inline').onclick = () => openColModal(c.id);
        row.querySelector('.btn-del-inline').onclick = async () => {
          const ok = await showConfirm(
            `Delete "${c.label}"?`,
            count ? `${count} product${count === 1 ? '' : 's'} currently tagged with this collection will lose that tag.` : 'This cannot be undone.'
          );
          if (!ok) return;
          try {
            await sbDeleteCollection(c.id);
            collections = collections.filter(x => x.id !== c.id);
            refreshCollectionGlobals();
            renderCollections();
            buildCatFilter();
            buildColGrid();
            toast('Collection deleted.');
          } catch (err) {
            toast('Delete failed: ' + err.message, true);
          }
        };
        list.appendChild(row);
      });
      if (!collections.length) list.innerHTML = '<p style="color:var(--muted);font-size:.88rem;padding:40px 0">No collections yet.</p>';
    }

    function openColModal(id) {
      editingColId = id ?? null;
      const c = id != null ? collections.find(x => x.id === id) : null;
      document.getElementById('colModalTitle').textContent = c ? 'Edit Collection' : 'Add Collection';
      document.getElementById('cfLabel').value = c?.label ?? '';
      document.getElementById('cfId').value = c?.id ?? '';
      document.getElementById('cfId').disabled = !!c;
      document.getElementById('cfSort').value = c?.sort_order ?? collections.length;
      document.getElementById('colModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('cfLabel').focus(), 50);
    }

    function closeColModal() {
      document.getElementById('colModal').classList.add('hidden');
      editingColId = null;
    }

    async function saveColModal() {
      const label = document.getElementById('cfLabel').value.trim();
      let id = document.getElementById('cfId').value.trim();
      const sort_order = parseInt(document.getElementById('cfSort').value, 10) || 0;

      if (!label) { toast('Enter a collection label.', true); return; }
      if (!editingColId) {
        if (!id) id = slugify(label);
        if (!id) { toast('Enter a valid slug.', true); return; }
        if (collections.some(c => c.id === id)) { toast('A collection with this slug already exists.', true); return; }
      } else {
        id = editingColId;
      }

      const btn = document.getElementById('btnColModalSave');
      btn.disabled = true; btn.textContent = 'Saving…';

      try {
        if (editingColId) {
          const [updated] = await sbUpdateCollection(editingColId, { label, sort_order });
          collections = collections.map(c => c.id === editingColId ? updated : c);
        } else {
          const [created] = await sbInsertCollection({ id, label, sort_order });
          collections.push(created);
        }
        collections.sort((a, b) => a.sort_order - b.sort_order);
        refreshCollectionGlobals();
        buildCatFilter();
        buildColGrid();
        renderCollections();
        closeColModal();
        toast(editingColId ? 'Collection updated.' : 'Collection added.');
      } catch (err) {
        toast('Save failed: ' + err.message, true);
      } finally {
        btn.disabled = false; btn.textContent = 'Save Collection';
      }
    }

    function renderImgChips(imgs) {
      modalImgs = [...imgs];
      const c = document.getElementById('imgChips');
      c.innerHTML = '';
      modalImgs.forEach((img, i) => {
        const chip = document.createElement('div');
        chip.className = 'img-chip';
        const pending = pendingImgs.find(p => p.filename === img);
        const src = pending ? pending.dataUrl : imgSrc(img);
        const displayName = img.startsWith('http') ? img.split('/').pop().split('?')[0] : img;
        chip.innerHTML = `<img src="${src}" alt="" onerror="this.style.display='none'"/><span title="${img}">${displayName}</span><button type="button" class="img-rm" title="Remove">✕</button>`;
        chip.querySelector('.img-rm').onclick = () => { modalImgs.splice(i, 1); renderImgChips(modalImgs); };
        c.appendChild(chip);
      });
    }

    function openModal(id) {
      editingId = id ?? null;
      pendingImgs = [];
      const p = id != null ? products.find(x => x.id === id) : null;
      document.getElementById('modalTitle').textContent = p ? 'Edit Product' : 'Add Product';
      document.getElementById('fName').value = p?.name ?? '';
      document.getElementById('fPrice').value = p?.price ?? '';
      document.getElementById('fDesc').value = p?.desc ?? '';
      document.getElementById('fHeight').value = p?.height ?? '';
      document.getElementById('fWidth').value = p?.width ?? '';
      document.getElementById('fBadge').value = p?.badge ?? '';
      const cols = p ? (Array.isArray(p.collection) ? p.collection : [p.collection]) : [];
      collections.forEach(t => { const cb = document.getElementById(`col_${t.id}`); if (cb) cb.checked = cols.includes(t.id); });
      renderImgChips(p?.img ? (Array.isArray(p.img) ? [...p.img] : [p.img]) : []);
      document.getElementById('modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('fName').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingId = null; modalImgs = []; pendingImgs = [];
    }

    async function saveModal() {
      const name = document.getElementById('fName').value.trim();
      const price = parseFloat(document.getElementById('fPrice').value);
      const desc = document.getElementById('fDesc').value.trim();
      const height = document.getElementById('fHeight').value.trim();
      const width = document.getElementById('fWidth').value.trim();
      const badge = document.getElementById('fBadge').value;
      const collection = collections.filter(t => document.getElementById(`col_${t.id}`)?.checked).map(t => t.id);

      if (!name) { toast('Enter a product name.', true); return; }
      if (isNaN(price) || price < 0) { toast('Enter a valid price.', true); return; }
      if (!collection.length) { toast('Select at least one collection.', true); return; }

      const btn = document.getElementById('btnModalSave');
      btn.disabled = true; btn.textContent = 'Saving…';

      try {
        // Upload pending images to Supabase Storage
        const finalImgs = [...modalImgs];
        for (const pending of pendingImgs) {
          const idx = finalImgs.indexOf(pending.filename);
          if (idx !== -1) {
            const url = await sbUploadImage(pending.filename, pending.base64, pending.mimeType);
            finalImgs[idx] = url;
          }
        }

        const img = finalImgs.length === 0 ? null : finalImgs.length === 1 ? finalImgs[0] : finalImgs;
        const product = {
          name, 'desc': desc, price,
          img,
          collection: collection.length === 1 ? collection[0] : collection,
          badge: badge || '',
          height: height || null,
          width: width || null,
        };

        if (editingId != null) {
          await sbUpdate(editingId, product);
          const idx = products.findIndex(p => p.id === editingId);
          if (idx !== -1) products[idx] = { ...products[idx], ...product };
          toast('Product updated.');
        } else {
          const result = await sbInsert(product);
          const newP = Array.isArray(result) ? result[0] : result;
          products.push(newP);
          toast('Product added.');
        }

        pendingImgs = [];
        renderList(document.getElementById('searchInput').value);
        closeModal();
      } catch (err) {
        toast('Save failed: ' + err.message, true);
      } finally {
        btn.disabled = false; btn.textContent = 'Save Product';
      }
    }

    // ── Image upload ────────────────────────────────────────────────────────────
    async function handleFiles(files) {
      for (const f of files) {
        const dataUrl = await fileToDataUrl(f);
        const base64 = dataUrl.split(',')[1];
        const mimeType = f.type || 'image/jpeg';
        const filename = f.name.replace(/\s+/g, '-');
        pendingImgs.push({ filename, base64, dataUrl, mimeType });
        modalImgs.push(filename);
      }
      renderImgChips(modalImgs);
    }

    // ── Data load ───────────────────────────────────────────────────────────────
    async function loadData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('productList').innerHTML = '';
      try {
        [collections, products] = await Promise.all([sbGetCollections(), sbGetProducts()]);
        refreshCollectionGlobals();
        buildColGrid();
        buildCatFilter();
        renderList();
        renderCollections();
      } catch (err) {
        toast('Load failed: ' + err.message, true);
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    // ── Auth ────────────────────────────────────────────────────────────────────
    function doLogout() {
      showView('viewLogin');
      document.getElementById('inPw').value = '';
    }

    // ── Events ──────────────────────────────────────────────────────────────────
    document.getElementById('btnLogin').onclick = async () => {
      const pw = document.getElementById('inPw').value;
      if (!pw) { document.getElementById('loginErr').textContent = 'Enter your password.'; return; }
      const saved = localStorage.getItem(PW_KEY);
      if (!saved) {
        localStorage.setItem(PW_KEY, pw);
      } else if (pw !== saved) {
        document.getElementById('loginErr').textContent = 'Incorrect password.';
        return;
      }
      document.getElementById('loginErr').textContent = '';
      showView('viewMain');
      await loadData();
    };

    document.getElementById('inPw').onkeydown = e => { if (e.key === 'Enter') document.getElementById('btnLogin').click(); };

    document.getElementById('btnAdd').onclick = () => openModal(null);
    document.getElementById('btnLogout').onclick = doLogout;
    document.getElementById('btnCancel').onclick = closeModal;
    document.getElementById('btnModalSave').onclick = saveModal;
    document.getElementById('modal').onclick = e => { if (e.target === document.getElementById('modal')) closeModal(); };
    document.querySelectorAll('.view-tab').forEach(t => t.onclick = () => setView(t.dataset.view));
    document.getElementById('btnAddCol').onclick = () => openColModal(null);
    document.getElementById('btnColCancel').onclick = closeColModal;
    document.getElementById('btnColModalSave').onclick = saveColModal;
    document.getElementById('colModal').onclick = e => { if (e.target === document.getElementById('colModal')) closeColModal(); };
    document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e => { if (e.target.files.length) handleFiles(Array.from(e.target.files)); e.target.value = ''; };
    document.getElementById('searchInput').oninput = e => renderList(e.target.value);
    document.getElementById('btnSort').onclick = () => {
      sortDir = sortDir === 1 ? -1 : sortDir === -1 ? 0 : 1;
      document.getElementById('btnSort').textContent = sortDir === 1 ? 'Price ↑' : sortDir === -1 ? 'Price ↓' : 'Price';
      document.getElementById('btnSort').classList.toggle('btn-add', sortDir !== 0);
      renderList(document.getElementById('searchInput').value);
    };

    if (localStorage.getItem(PW_KEY)) {
      showView('viewMain');
      loadData();
    } else {
      document.getElementById('loginSub').textContent = 'First-time Setup — set your password';
      showView('viewLogin');
    }
  </script>
</body>

</html>
