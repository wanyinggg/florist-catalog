<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Lazy Cloudd</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --cream: #FAF6F1;
      --blush: #FDF9F7;
      --purple: #2C3E2D;
      --purple-mid: #8FAF8C;
      --purple-light: #f0e8e6;
      --pink: #E8C5C0;
      --pink-deep: #C9908A;
      --text: #3A2E2E;
      --muted: #9A8A88;
      --white: #FFFFFF;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Login */
    #viewLogin {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: var(--white);
      border: 1.5px solid var(--purple-light);
      border-radius: 20px;
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(44, 62, 45, .1);
    }

    .login-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--purple);
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .fg {
      margin-bottom: 14px;
    }

    .fg label {
      display: block;
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .fg input,
    .fg textarea,
    .fg select {
      width: 100%;
      border: 1.5px solid var(--purple-light);
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--blush);
      outline: none;
      transition: border-color .2s;
    }

    .fg input:focus,
    .fg textarea:focus,
    .fg select:focus {
      border-color: var(--purple);
    }

    .btn-primary {
      width: 100%;
      background: var(--purple);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: var(--purple-mid);
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .hint {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 14px;
      line-height: 1.7;
    }

    .hint a {
      color: var(--purple);
    }

    .err {
      font-size: .78rem;
      color: var(--pink-deep);
      margin-top: 8px;
      min-height: 20px;
    }

    /* Main */
    #viewMain {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .adm-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250, 248, 255, .95);
      backdrop-filter: blur(12px);
      border-bottom: 1.5px solid var(--purple-light);
      padding: 0 clamp(16px, 4vw, 48px);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .adm-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--purple);
    }

    .adm-logo em {
      font-family: 'Inter', sans-serif;
      font-size: .7rem;
      color: var(--muted);
      font-style: normal;
      margin-left: 8px;
    }

    .hdr-btns {
      display: flex;
      gap: 8px;
    }

    .btn-sm {
      background: none;
      border: 1.5px solid var(--purple-light);
      border-radius: 8px;
      padding: 6px 14px;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      color: var(--purple);
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }

    .btn-sm:hover {
      background: var(--purple-light);
    }

    .btn-sm:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .btn-add {
      background: var(--purple);
      color: var(--white);
      border-color: var(--purple);
    }

    .btn-add:hover {
      background: var(--purple-mid);
      border-color: var(--purple-mid);
    }

    .btn-save {
      background: var(--purple);
      color: var(--white);
      border-color: var(--purple);
    }

    .btn-save:hover {
      background: var(--purple-mid);
      border-color: var(--purple-mid);
    }

    .btn-save.dirty {
      background: var(--pink-deep);
      border-color: var(--pink-deep);
    }

    .adm-body {
      padding: clamp(16px, 3vw, 32px) clamp(16px, 4vw, 48px);
      flex: 1;
    }

    .body-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .body-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--purple);
    }

    .body-meta {
      font-size: .78rem;
      color: var(--muted);
    }

    /* Search */
    .search-bar {
      margin-bottom: 16px;
    }

    .search-bar input {
      width: 100%;
      max-width: 360px;
      border: 1.5px solid var(--purple-light);
      border-radius: 10px;
      padding: 9px 14px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color .2s;
    }

    .search-bar input:focus {
      border-color: var(--purple);
    }

    /* Product rows */
    .product-row {
      background: var(--white);
      border: 1.5px solid var(--purple-light);
      border-radius: 14px;
      padding: 12px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .pr-thumb {
      width: 48px;
      height: 58px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--purple-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
    }

    .pr-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .pr-info {
      flex: 1;
      min-width: 0;
    }

    .pr-name {
      display: block;
      font-size: .9rem;
      color: var(--purple);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-price {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--text);
    }

    .pr-col {
      display: block;
      font-size: .7rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .pr-btns {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .btn-edit,
    .btn-del {
      border: 1.5px solid var(--purple-light);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: 'Inter', sans-serif;
      font-size: .75rem;
      font-weight: 500;
      cursor: pointer;
      background: none;
      transition: background .2s;
    }

    .btn-edit {
      color: var(--purple);
    }

    .btn-edit:hover {
      background: var(--purple-light);
    }

    .btn-del {
      color: var(--pink-deep);
      border-color: #f5d5d0;
    }

    .btn-del:hover {
      background: #fff0ee;
    }

    #loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: .88rem;
    }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(46, 42, 69, .4);
      z-index: 300;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px 16px;
      overflow-y: auto;
      backdrop-filter: blur(3px);
    }

    .modal-box {
      background: var(--white);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 580px;
      box-shadow: 0 16px 48px rgba(44, 62, 45, .18);
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--purple);
      margin-bottom: 20px;
    }

    .fg-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 16px;
    }

    .fg.span2 {
      grid-column: 1/-1;
    }

    .section-lbl {
      font-size: .7rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 16px 0 8px;
      grid-column: 1/-1;
    }

    .col-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 6px;
      grid-column: 1/-1;
    }

    .col-cb {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .78rem;
      color: var(--text);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1.5px solid var(--purple-light);
      transition: background .15s;
    }

    .col-cb:hover {
      background: var(--blush);
    }

    .col-cb input {
      accent-color: var(--purple);
      cursor: pointer;
      flex-shrink: 0;
    }

    .img-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      grid-column: 1/-1;
      margin-bottom: 6px;
    }

    .img-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--blush);
      border: 1.5px solid var(--purple-light);
      border-radius: 8px;
      padding: 4px 8px 4px 4px;
      font-size: .7rem;
      color: var(--muted);
      max-width: 220px;
    }

    .img-chip img {
      width: 30px;
      height: 36px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .img-chip span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
    }

    .img-rm {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 0 2px;
      font-size: .8rem;
      flex-shrink: 0;
      line-height: 1;
    }

    .img-rm:hover {
      color: var(--pink-deep);
    }

    .btn-upload {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: none;
      border: 1.5px dashed var(--purple-light);
      border-radius: 8px;
      padding: 8px 16px;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      color: var(--purple);
      cursor: pointer;
      transition: background .2s;
      grid-column: 1/-1;
    }

    .btn-upload:hover {
      background: var(--blush);
    }

    .modal-foot {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1.5px solid var(--purple-light);
    }

    .btn-cancel {
      background: none;
      border: 1.5px solid var(--purple-light);
      border-radius: 10px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      color: var(--muted);
      cursor: pointer;
      transition: background .2s;
    }

    .btn-cancel:hover {
      background: var(--blush);
    }

    .btn-ms {
      background: var(--purple);
      color: var(--white);
      border: none;
      border-radius: 10px;
      padding: 10px 24px;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-ms:hover {
      background: var(--purple-mid);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--purple);
      color: var(--white);
      padding: 9px 20px;
      border-radius: 30px;
      font-size: .8rem;
      font-weight: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 500;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.err {
      background: var(--pink-deep);
    }

    @media(max-width:600px) {
      .fg-grid {
        grid-template-columns: 1fr;
      }

      .fg.span2 {
        grid-column: 1;
      }

      .section-lbl {
        grid-column: 1;
      }

      .col-grid {
        grid-column: 1;
      }

      .img-chips {
        grid-column: 1;
      }

      .btn-upload {
        grid-column: 1;
      }

      .adm-logo em {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- Login -->
  <div id="viewLogin">
    <div class="login-card">
      <div class="login-brand">Lazy Cloudd</div>
      <div class="login-sub" id="loginSub">Admin Login</div>
      <div class="fg">
        <label>Password</label>
        <input type="password" id="inPw" placeholder="Admin password" autocomplete="current-password" />
      </div>
      <div class="fg" id="fgToken">
        <label>GitHub Token <span style="font-weight:400;text-transform:none;letter-spacing:0">(first-time
            setup)</span></label>
        <input type="password" id="inToken" placeholder="ghp_..." autocomplete="off" />
      </div>
      <button class="btn-primary" id="btnLogin">Login</button>
      <p class="err" id="loginErr"></p>
      <p class="hint" id="loginHint">
        Need a GitHub token?
        <a href="https://github.com/settings/tokens/new?scopes=repo&description=florist-catalog-admin" target="_blank"
          rel="noopener">Create one here</a>
        — select <strong>repo</strong> scope. Paste it above on first login.
      </p>
    </div>
  </div>

  <!-- Main -->
  <div id="viewMain" class="hidden">
    <header class="adm-header">
      <div class="adm-logo">Lazy Cloudd <em>Admin</em></div>
      <div class="hdr-btns">
        <button class="btn-sm btn-add" id="btnAdd">+ Add Product</button>
        <button class="btn-sm btn-save" id="btnSave">Save to GitHub</button>
        <button class="btn-sm" id="btnLogout">Logout</button>
      </div>
    </header>
    <div class="adm-body">
      <div class="body-head">
        <h1 class="body-title">Products</h1>
        <span class="body-meta" id="bodyMeta"></span>
      </div>
      <div class="search-bar">
        <input type="search" id="searchInput" placeholder="Search products…" />
      </div>
      <div id="loading">Loading…</div>
      <div id="productList"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-bg hidden">
    <div class="modal-box">
      <h2 class="modal-title" id="modalTitle">Add Product</h2>
      <div class="fg-grid">
        <div class="fg span2">
          <label>Name</label>
          <input type="text" id="fName" placeholder="Product name" />
        </div>
        <div class="fg">
          <label>Price (RM)</label>
          <input type="number" id="fPrice" placeholder="0" min="0" step="1" />
        </div>
        <div class="fg">
          <label>Badge</label>
          <select id="fBadge">
            <option value="">None</option>
            <option value="popular">Popular</option>
            <option value="seasonal">Seasonal</option>
            <option value="custom">Custom-friendly</option>
          </select>
        </div>
        <div class="fg span2">
          <label>Description</label>
          <textarea id="fDesc" rows="2" placeholder="Optional description…"></textarea>
        </div>
        <div class="fg">
          <label>Height <span style="font-weight:400;font-size:.68rem">(optional)</span></label>
          <input type="text" id="fHeight" placeholder="e.g. 40cm" />
        </div>
        <div class="fg">
          <label>Width <span style="font-weight:400;font-size:.68rem">(optional)</span></label>
          <input type="text" id="fWidth" placeholder="e.g. 30cm" />
        </div>

        <div class="section-lbl">Collections</div>
        <div class="col-grid" id="colGrid"></div>

        <div class="section-lbl">Images</div>
        <div class="img-chips" id="imgChips"></div>
        <button type="button" class="btn-upload" id="btnUpload">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          Upload image(s)
        </button>
        <input type="file" id="fileInput" accept="image/*" multiple class="hidden" />
      </div>
      <div class="modal-foot">
        <button class="btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn-ms" id="btnModalSave">Save Product</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    if (location.hostname === 'lazycloudd.com') { location.replace('/'); }

    const OWNER = 'wanyinggg', REPO = 'florist-catalog', BRANCH = 'main';
    const PRODUCTS_PATH = 'products.js', IMG_DIR = 'images';
    const PW_KEY = 'lc_adm_pw', TK_KEY = 'lc_adm_tk';

    let token = '', products = [], tabs = [], fileSha = '', fileHeader = '';
    let editingId = null, modalImgs = [], pendingImgs = [], dirty = false;

    // ── GitHub API ──────────────────────────────────────────────────────────────
    async function ghGet(path) {
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}&_=${Date.now()}`, {
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
      return r.json();
    }

    async function ghPut(path, b64, sha, msg) {
      const body = { message: msg, content: b64, branch: BRANCH };
      if (sha) body.sha = sha;
      const r = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}`, {
        method: 'PUT',
        headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || `HTTP ${r.status}`); }
      return r.json();
    }

    // ── Encoding ────────────────────────────────────────────────────────────────
    const b64Dec = s => decodeURIComponent(escape(atob(s.replace(/\n/g, ''))));
    const strB64 = s => btoa(unescape(encodeURIComponent(s)));
    const fileB64 = f => new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.onerror = rej; r.readAsDataURL(f); });

    // ── Parse & Serialize ───────────────────────────────────────────────────────
    function parseFile(content) {
      try { tabs = new Function(content + ';return typeof TABS!=="undefined"?TABS:[];')(); } catch { tabs = []; }
      try { products = new Function(content + ';return typeof PRODUCTS!=="undefined"?PRODUCTS:[];')(); } catch { products = []; }
      const marker = 'const PRODUCTS = [';
      const idx = content.indexOf(marker);
      fileHeader = idx !== -1 ? content.substring(0, idx) : content;
    }

    function serializeProducts() {
      const rows = products.map(p => {
        const L = ['  {'];
        L.push(`    id: ${p.id},`);
        L.push(`    name: ${JSON.stringify(p.name)},`);
        L.push(`    desc: ${JSON.stringify(p.desc || '')},`);
        L.push(`    price: ${p.price},`);
        if (p.img !== undefined) {
          if (Array.isArray(p.img)) {
            if (p.img.length > 2) {
              L.push(`    img: [\n${p.img.map(s => `      ${JSON.stringify(s)},`).join('\n')}\n    ],`);
            } else {
              L.push(`    img: [${p.img.map(s => JSON.stringify(s)).join(', ')}],`);
            }
          } else {
            L.push(`    img: ${JSON.stringify(p.img)},`);
          }
        }
        const col = Array.isArray(p.collection) ? p.collection : [p.collection];
        L.push(`    collection: ${col.length === 1 ? JSON.stringify(col[0]) : `[${col.map(c => JSON.stringify(c)).join(', ')}]`},`);
        L.push(`    badge: ${JSON.stringify(p.badge || '')},`);
        if (p.height) L.push(`    height: ${JSON.stringify(p.height)},`);
        if (p.width) L.push(`    width: ${JSON.stringify(p.width)},`);
        L.push('  }');
        return L.join('\n');
      });
      return `${fileHeader}const PRODUCTS = [\n${rows.join(',\n')}\n];\n`;
    }

    // ── UI helpers ──────────────────────────────────────────────────────────────
    function showView(id) {
      ['viewLogin', 'viewMain'].forEach(v => document.getElementById(v).classList.toggle('hidden', v !== id));
    }

    let toastTimer;
    function toast(msg, isErr = false) {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = 'toast show' + (isErr ? ' err' : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
    }

    function updateSaveBtn() {
      const btn = document.getElementById('btnSave');
      btn.textContent = dirty ? '● Save to GitHub' : 'Save to GitHub';
      btn.classList.toggle('dirty', dirty);
    }

    // ── Product list ────────────────────────────────────────────────────────────
    function renderList(filter = '') {
      const list = document.getElementById('productList');
      const q = filter.toLowerCase();
      const visible = q ? products.filter(p => p.name.toLowerCase().includes(q) || String(p.price).includes(q)) : products;
      document.getElementById('bodyMeta').textContent = `${products.length} products${q ? ` · ${visible.length} shown` : ''}`;
      list.innerHTML = '';
      visible.forEach(p => {
        const row = document.createElement('div');
        row.className = 'product-row';
        const imgSrc = p.img ? (Array.isArray(p.img) ? p.img[0] : p.img) : null;
        const cols = (Array.isArray(p.collection) ? p.collection : [p.collection]).join(', ');
        row.innerHTML = `
      <div class="pr-thumb">${imgSrc ? `<img src="${IMG_DIR}/${imgSrc}" alt="" onerror="this.style.display='none'"/>` : '🌸'}</div>
      <div class="pr-info">
        <span class="pr-name">${p.name}</span>
        <span class="pr-price">RM ${p.price}</span>
        <span class="pr-col">${cols}</span>
      </div>
      <div class="pr-btns">
        <button class="btn-edit">Edit</button>
        <button class="btn-del">Delete</button>
      </div>`;
        row.querySelector('.btn-edit').onclick = () => openModal(p.id);
        row.querySelector('.btn-del').onclick = () => {
          if (!confirm(`Delete "${p.name}"?`)) return;
          products = products.filter(x => x.id !== p.id);
          dirty = true; renderList(document.getElementById('searchInput').value); updateSaveBtn();
        };
        list.appendChild(row);
      });
      if (!visible.length) list.innerHTML = '<p style="color:var(--muted);font-size:.88rem;padding:40px 0">No products found.</p>';
    }

    // ── Modal ───────────────────────────────────────────────────────────────────
    function buildColGrid() {
      const g = document.getElementById('colGrid');
      g.innerHTML = '';
      tabs.forEach(t => {
        const lbl = document.createElement('label');
        lbl.className = 'col-cb';
        lbl.innerHTML = `<input type="checkbox" id="col_${t.id}" value="${t.id}"/>${t.label}`;
        g.appendChild(lbl);
      });
    }

    function renderImgChips(imgs) {
      modalImgs = [...imgs];
      const c = document.getElementById('imgChips');
      c.innerHTML = '';
      modalImgs.forEach((img, i) => {
        const chip = document.createElement('div');
        chip.className = 'img-chip';
        chip.innerHTML = `<img src="${IMG_DIR}/${img}" alt="" onerror="this.style.display='none'"/><span title="${img}">${img}</span><button type="button" class="img-rm" title="Remove">✕</button>`;
        chip.querySelector('.img-rm').onclick = () => { modalImgs.splice(i, 1); renderImgChips(modalImgs); };
        c.appendChild(chip);
      });
    }

    function openModal(id) {
      editingId = id ?? null;
      const p = id != null ? products.find(x => x.id === id) : null;
      document.getElementById('modalTitle').textContent = p ? 'Edit Product' : 'Add Product';
      document.getElementById('fName').value = p?.name ?? '';
      document.getElementById('fPrice').value = p?.price ?? '';
      document.getElementById('fDesc').value = p?.desc ?? '';
      document.getElementById('fHeight').value = p?.height ?? '';
      document.getElementById('fWidth').value = p?.width ?? '';
      document.getElementById('fBadge').value = p?.badge ?? '';
      const cols = p ? (Array.isArray(p.collection) ? p.collection : [p.collection]) : [];
      tabs.forEach(t => { const cb = document.getElementById(`col_${t.id}`); if (cb) cb.checked = cols.includes(t.id); });
      renderImgChips(p?.img ? (Array.isArray(p.img) ? [...p.img] : [p.img]) : []);
      document.getElementById('modal').classList.remove('hidden');
      setTimeout(() => document.getElementById('fName').focus(), 50);
    }

    function closeModal() {
      document.getElementById('modal').classList.add('hidden');
      editingId = null; modalImgs = [];
    }

    function saveModal() {
      const name = document.getElementById('fName').value.trim();
      const price = parseFloat(document.getElementById('fPrice').value);
      const desc = document.getElementById('fDesc').value.trim();
      const height = document.getElementById('fHeight').value.trim();
      const width = document.getElementById('fWidth').value.trim();
      const badge = document.getElementById('fBadge').value;
      const collection = tabs.filter(t => document.getElementById(`col_${t.id}`)?.checked).map(t => t.id);

      if (!name) { toast('Enter a product name.', true); return; }
      if (isNaN(price) || price < 0) { toast('Enter a valid price.', true); return; }
      if (!collection.length) { toast('Select at least one collection.', true); return; }

      const img = modalImgs.length === 0 ? undefined : modalImgs.length === 1 ? modalImgs[0] : [...modalImgs];
      const nextId = editingId ?? (products.length ? Math.max(...products.map(p => p.id)) + 1 : 1);
      const product = {
        id: nextId, name, desc, price,
        ...(img !== undefined && { img }),
        collection: collection.length === 1 ? collection[0] : collection,
        badge,
        ...(height && { height }),
        ...(width && { width })
      };

      if (editingId != null) {
        const idx = products.findIndex(p => p.id === editingId);
        if (idx !== -1) products[idx] = product;
      } else {
        products.push(product);
      }

      dirty = true;
      renderList(document.getElementById('searchInput').value);
      updateSaveBtn();
      closeModal();
      toast(editingId != null ? 'Product updated.' : 'Product added.');
    }

    // ── Save to GitHub ──────────────────────────────────────────────────────────
    async function saveToGitHub() {
      const btn = document.getElementById('btnSave');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        for (const { filename, base64 } of pendingImgs) {
          let sha;
          try { sha = (await ghGet(`${IMG_DIR}/${filename}`)).sha; } catch { }
          await ghPut(`${IMG_DIR}/${filename}`, base64, sha, `Upload image: ${filename}`);
        }
        pendingImgs = [];
        const content = serializeProducts();
        const res = await ghPut(PRODUCTS_PATH, strB64(content), fileSha, 'Update products via admin');
        fileSha = res.content.sha;
        dirty = false; updateSaveBtn();
        toast('✓ Saved! Cloudflare will deploy in ~1 min.');
      } catch (err) {
        toast('Save failed: ' + err.message, true);
        updateSaveBtn();
      } finally {
        btn.disabled = false;
      }
    }

    // ── Image upload ────────────────────────────────────────────────────────────
    async function handleFiles(files) {
      for (const f of files) {
        const base64 = await fileB64(f);
        const filename = f.name.replace(/\s+/g, '-');
        pendingImgs.push({ filename, base64 });
        modalImgs.push(filename);
      }
      renderImgChips(modalImgs);
    }

    // ── Auth ────────────────────────────────────────────────────────────────────
    function isSetup() { return !!localStorage.getItem(PW_KEY); }

    async function loadData() {
      document.getElementById('loading').classList.remove('hidden');
      document.getElementById('productList').innerHTML = '';
      try {
        const data = await ghGet(PRODUCTS_PATH);
        fileSha = data.sha;
        parseFile(b64Dec(data.content));
        buildColGrid();
        renderList();
      } catch (err) {
        toast('Load failed: ' + err.message, true);
        doLogout();
      } finally {
        document.getElementById('loading').classList.add('hidden');
      }
    }

    function doLogout() {
      token = ''; showView('viewLogin');
      document.getElementById('inPw').value = '';
      document.getElementById('inToken').value = '';
      updateLoginUI();
    }

    function updateLoginUI() {
      const setup = !isSetup();
      document.getElementById('loginSub').textContent = setup ? 'First-time Setup' : 'Admin Login';
      document.getElementById('fgToken').classList.toggle('hidden', !setup);
      document.getElementById('loginHint').classList.toggle('hidden', !setup);
    }

    // ── Events ──────────────────────────────────────────────────────────────────
    document.getElementById('btnLogin').onclick = async () => {
      const pw = document.getElementById('inPw').value;
      const tk = document.getElementById('inToken').value.trim();
      const setup = !isSetup();

      if (!pw || (setup && !tk)) {
        document.getElementById('loginErr').textContent = setup ? 'Enter both a password and your GitHub token.' : 'Enter your password.';
        return;
      }
      document.getElementById('loginErr').textContent = '';

      if (setup) {
        localStorage.setItem(PW_KEY, pw);
        localStorage.setItem(TK_KEY, tk);
      } else {
        if (pw !== localStorage.getItem(PW_KEY)) {
          document.getElementById('loginErr').textContent = 'Incorrect password.';
          return;
        }
        if (tk) localStorage.setItem(TK_KEY, tk); // allow token update
      }

      token = localStorage.getItem(TK_KEY);
      if (!token) { document.getElementById('loginErr').textContent = 'No GitHub token saved. Re-enter it below.'; localStorage.removeItem(PW_KEY); updateLoginUI(); return; }

      showView('viewMain');
      await loadData();
    };

    document.getElementById('inPw').onkeydown = e => { if (e.key === 'Enter') (isSetup() ? document.getElementById('btnLogin') : document.getElementById('inToken')).focus(); };
    document.getElementById('inToken').onkeydown = e => { if (e.key === 'Enter') document.getElementById('btnLogin').click(); };

    document.getElementById('btnAdd').onclick = () => openModal(null);
    document.getElementById('btnSave').onclick = saveToGitHub;
    document.getElementById('btnLogout').onclick = doLogout;
    document.getElementById('btnCancel').onclick = closeModal;
    document.getElementById('btnModalSave').onclick = saveModal;
    document.getElementById('modal').onclick = e => { if (e.target === document.getElementById('modal')) closeModal(); };
    document.getElementById('btnUpload').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e => { if (e.target.files.length) handleFiles(Array.from(e.target.files)); e.target.value = ''; };
    document.getElementById('searchInput').oninput = e => renderList(e.target.value);

    updateLoginUI();
    showView('viewLogin');
  </script>
</body>

</html>
