<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Lazy Cloudd — Handcrafted Flowers</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="icon" href="flower.png" type="image/png" />
  <link rel="stylesheet" href="assets/styles.css" />
  <style>
    /* ── Storefront ─────────────────────────────────────────────────────── */
    .storefront {
      padding-bottom: clamp(40px, 7vw, 72px);
    }

    .cat-section {
      margin-bottom: 8px;
    }

    .cat-section-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 24px clamp(16px, 5vw, 80px) 12px;
    }

    .cat-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--purple);
    }

    .view-all-btn {
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--pink-deep);
      text-decoration: none;
      letter-spacing: 0.03em;
      white-space: nowrap;
      transition: color 0.2s;
    }

    .view-all-btn:hover {
      color: var(--purple);
    }

    .cat-row {
      display: grid;
      gap: 12px;
      padding: 2px clamp(16px, 5vw, 80px) 14px;
    }

    .mini-card {
      background: var(--white);
      border: 1.5px solid var(--purple-light);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .mini-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(70, 90, 220, 0.1);
    }

    .mini-card-img {
      width: 100%;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      position: relative;
      overflow: hidden;
    }

    .mini-card-img img,
    .mini-card-img video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .mini-card-body {
      padding: 9px 11px 11px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .mini-card-name {
      font-size: 0.8rem;
      color: var(--purple);
      line-height: 1.3;
      margin-bottom: 8px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .mini-card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mini-card-price {
      font-size: 0.77rem;
      font-weight: 600;
      color: var(--text);
    }

    .mini-add-btn {
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--purple);
      color: var(--white);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .mini-add-btn:hover {
      background: var(--purple-mid);
    }

    .mini-card-more {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      text-decoration: none;
      background: var(--purple-light);
      border: 1.5px dashed var(--purple-mid);
      color: var(--purple);
    }

    .mini-card-more span:first-child {
      font-size: 1.3rem;
      font-weight: 700;
    }

    .mini-card-more-label {
      font-size: 0.72rem;
      font-weight: 500;
      opacity: 0.75;
    }

    .mini-card-more:hover {
      background: var(--purple-light);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(70, 90, 220, 0.1);
    }

    .storefront-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 60px 20px;
      line-height: 1.8;
    }

    /* ── Custom Banner ──────────────────────────────────────────────────── */
    .custom-banner {
      margin: 8px clamp(16px, 5vw, 80px) clamp(36px, 6vw, 56px);
      background: var(--purple);
      border-radius: 20px;
      padding: clamp(28px, 5vw, 48px) clamp(24px, 5vw, 56px);
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
    }

    .custom-banner-text {
      flex: 1;
      min-width: 200px;
    }

    .custom-banner-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 10px;
    }

    .custom-banner-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.8rem);
      color: var(--white);
      margin-bottom: 8px;
      line-height: 1.25;
    }

    .custom-banner-sub {
      font-size: 0.82rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.65;
    }

    .custom-wa-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25D366;
      color: var(--white);
      border: none;
      border-radius: 12px;
      padding: 13px 22px;
      font-family: 'Inter', sans-serif;
      font-size: 0.86rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
      text-decoration: none;
    }

    .custom-wa-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    @media (max-width: 768px) {
      .custom-banner {
        flex-direction: column;
      }

      .cat-row-scroll {
        scrollbar-width: none;
      }

      .cat-row-scroll::-webkit-scrollbar {
        display: none;
      }

      .mini-card-img {
        height: 150px;
      }
    }
  </style>
</head>

<body>

  <nav id="site-nav"></nav>

  <div id="storefront" class="storefront"></div>

  <div class="custom-banner" id="custom">
    <div class="custom-banner-text">
      <p class="custom-banner-label">Bespoke Orders</p>
      <h3 class="custom-banner-title">Want something made<br />just for you?</h3>
      <p class="custom-banner-sub">Custom colours, mixed bouquets, personalised notes — just WhatsApp us and let's chat!
      </p>
    </div>
    <a class="custom-wa-btn" id="customWaBtn" href="#" target="_blank" rel="noopener">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
      </svg>
      Chat with Us
    </a>
  </div>

  <footer id="site-footer"></footer>

  <script src="assets/supabase.js"></script>
  <script src="products.js"></script>
  <script src="assets/components.js"></script>
  <script>
    LC.renderNav('catalog');
    LC.renderFooter();
    LC.initCart({ emptyMsg: 'No items yet' });

    const mq = window.matchMedia('(max-width: 768px)');

    function renderStorefront() {
      const main = document.getElementById('storefront');
      main.innerHTML = '';
      let hasAny = false;

      TABS.forEach(cat => {
        const inCat = p => Array.isArray(p.collection) ? p.collection.includes(cat.id) : p.collection === cat.id;
        const items = PRODUCTS.filter(inCat).sort((a, b) => a.price - b.price);
        if (items.length === 0) return;
        hasAny = true;

        const section = document.createElement('div');
        section.className = 'cat-section';
        section.innerHTML = `
          <div class="cat-section-head">
            <h2 class="cat-section-title">${cat.label}</h2>
            <a href="collection.html?cat=${cat.id}" class="view-all-btn">View all →</a>
          </div>
          <div class="cat-row" id="row-${cat.id}"></div>`;
        main.appendChild(section);

        const row = section.querySelector(`#row-${cat.id}`);
        const isMobile = mq.matches;

        const buildCard = (p) => {
          const card = document.createElement('div');
          card.className = 'mini-card';
          const bg = BG[Array.isArray(p.collection) ? p.collection[0] : p.collection] || '#ede8ff';
          const firstImg = Array.isArray(p.img) ? p.img[0] : p.img;
          card.innerHTML = `
            <div class="mini-card-img" style="background:${bg}">
              ${p.img ? (Array.isArray(p.img) && p.img.length > 1
              ? `<div class="img-track">${p.img.map(s => `<div class="img-slide">${mediaTag(s, p.name)}</div>`).join('')}</div>`
              : mediaTag(firstImg, p.name)) : ''}
              ${p.badge ? `<span class="card-badge ${BADGE_CLASS[p.badge]}">${BADGE_LABEL[p.badge]}</span>` : ''}
            </div>
            <div class="mini-card-body">
              <p class="mini-card-name">${p.name}</p>
              <div class="mini-card-foot">
                <span class="mini-card-price">RM ${p.price}</span>
                <button class="mini-add-btn" data-id="${p.id}">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                </button>
              </div>
            </div>`;
          card.style.cursor = 'pointer';
          card.addEventListener('click', () => location.href = `item.html?id=${p.id}`);
          return card;
        };

        if (isMobile) {
          const padPx = `${Math.min(80, Math.max(16, window.innerWidth * 0.05))}px`;
          row.classList.add('cat-row-scroll');
          row.style.display = 'flex';
          row.style.overflowX = 'auto';
          row.style.gap = '0';
          row.style.padding = '2px 0 14px';
          row.style.scrollSnapType = 'x mandatory';
          row.style.scrollPaddingLeft = padPx;
          const leadSpacer = document.createElement('div');
          leadSpacer.style.cssText = `flex: 0 0 ${padPx};`;
          row.appendChild(leadSpacer);
          items.forEach(p => {
            const card = buildCard(p);
            card.style.flex = '0 0 130px';
            card.style.scrollSnapAlign = 'start';
            card.style.marginRight = '10px';
            row.appendChild(card);
          });
          const trailSpacer = document.createElement('div');
          trailSpacer.style.cssText = `flex: 0 0 ${padPx};`;
          row.appendChild(trailSpacer);
        } else {
          const sidePad = Math.min(80, Math.max(16, window.innerWidth * 0.05)) * 2;
          const rowWidth = window.innerWidth - sidePad;
          const fits = Math.max(2, Math.floor((rowWidth + 12) / (150 + 12)));
          const SHOW = items.length > fits ? fits - 1 : fits;
          items.slice(0, SHOW).forEach(p => row.appendChild(buildCard(p)));
          if (items.length > SHOW) {
            const more = document.createElement('a');
            more.className = 'mini-card mini-card-more';
            more.href = `collection.html?cat=${cat.id}`;
            more.innerHTML = `<span>+${items.length - SHOW}</span><span class="mini-card-more-label">more</span>`;
            row.appendChild(more);
          }
          const hasMore = items.length > fits;
          const colCount = Math.min(items.length, fits);
          row.style.gridTemplateColumns = hasMore
            ? `repeat(${colCount}, 1fr)`
            : `repeat(${colCount}, 150px)`;
        }

        row.querySelectorAll('.mini-add-btn').forEach(btn =>
          btn.addEventListener('click', e => { e.stopPropagation(); LC.addToCart(+btn.dataset.id); })
        );
      });

      if (!hasAny) {
        main.innerHTML = '<p class="storefront-empty">🌸<br />No products yet.</p>';
      }
    }

    document.getElementById('customWaBtn').href =
      `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent("Hi! I'd like to enquire about a custom flower order")}`;

    mq.addEventListener('change', () => { renderStorefront(); LC.initCarousels(); });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { renderStorefront(); LC.initCarousels(); }, 200);
    });

    document.getElementById('storefront').innerHTML =
      '<p style="text-align:center;padding:60px 0;color:#aaa;">Loading...</p>';

    Promise.all([sbGetCollections(), sbGetProducts()]).then(([cols, prods]) => {
      TABS = cols;
      BG = Object.fromEntries(cols.map(c => [c.id, c.bg]));
      PRODUCTS = prods;
      renderStorefront();
      LC.initCarousels();
    }).catch(() => {
      document.getElementById('storefront').innerHTML =
        '<p style="text-align:center;padding:60px 0;color:#c00;">Failed to load products. Please refresh.</p>';
    });
  </script>
</body>

</html>
